  <!-- 09 Sum all values of an object -->
  <script>
    let marks = {
      math: 80,
      science: 70,
      english: 90
    };

    let sum = 0;

    for (let key in marks) {
      sum += marks[key];
    }

    document.write("Total: " + sum);
  </script>
  <!-- 10 Find student with highest marks -->
  <script>
    let students = [
      { name: "Asha", marks: 80 },
      { name: "Bishu", marks: 90 },
      { name: "Pooja", marks: 70 }
    ];
    let topStudent = students[0];

    for (let i = 1; i < students.length; i++) {
      if (students[i].marks > topStudent.marks) {
        topStudent = students[i];
      }
    }
    document.write("Topper: " + topStudent.name + " (" + topStudent.marks + ")");
  </script>
